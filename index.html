<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>타이칸 매물 대시보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">◾</span>
      <div>
        <h1>Taycan Market</h1>
        <p class="sub">포르쉐 타이칸 중고 매물 · 차량번호 기준 통합</p>
      </div>
    </div>
    <div class="meta" id="meta">불러오는 중…</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="listings">매물</button>
    <button class="tab" data-view="options">옵션표</button>
  </nav>

  <main>
    <!-- 매물 뷰 -->
    <section id="view-listings">
      <div class="filters">
        <input type="search" id="q" placeholder="검색 (트림·색상·지역·옵션·번호)" />
        <select id="f-trim"><option value="">전체 트림</option></select>
        <select id="f-source"><option value="">전체 소스</option></select>
        <select id="f-status"><option value="">전체 상태</option></select>
        <select id="f-sort">
          <option value="last_seen">최근 관측순</option>
          <option value="price_asc">가격 낮은순</option>
          <option value="price_desc">가격 높은순</option>
          <option value="mileage_asc">주행 적은순</option>
          <option value="year_desc">연식 최신순</option>
        </select>
        <label class="chk"><input type="checkbox" id="f-active" checked /> 판매중만</label>
      </div>
      <div class="count" id="count"></div>
      <div class="grid" id="grid"></div>
    </section>

    <!-- 옵션표 뷰 -->
    <section id="view-options" hidden>
      <div class="filters">
        <input type="search" id="oq" placeholder="옵션 검색 (코드·이름)" />
        <select id="o-trim"><option value="">전체 트림</option></select>
      </div>
      <div class="table-wrap">
        <table id="otable">
          <thead><tr><th>연식</th><th>트림</th><th>분류</th><th>코드</th><th>옵션명</th><th>EN</th><th>기본</th><th>비고</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 매물 상세 모달 -->
  <div class="modal" id="modal" hidden>
    <div class="modal-bg" data-close></div>
    <div class="modal-card" id="modal-card"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
